user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    access_log          /var/log/nginx/access.log;
    error_log           /var/log/nginx/error.log;

    # HTTP to HTTPS redirect & Certbot Challenge support
    server {
        listen 80;
        server_name localhost; # 실운영 시 도메인 주소로 변경 가능 (예: api.yourdomain.com)

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server config
    server {
        listen 443 ssl;
        server_name localhost; # 실운영 시 도메인 주소로 변경 가능 (예: api.yourdomain.com)

        # SSL Certificates location
        # [로컬 개발] Dockerfile에서 생성된 자체 서명 인증서 사용
        # [운영 환경] Let's Encrypt 인증서 경로(fullchain.pem, privkey.pem)를 이 파일 경로에 볼륨 매핑하여 사용합니다.
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Reverse Proxy to Spring Boot app
        location / {
            proxy_pass          http://127.0.0.1:8080;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }
    }
}
