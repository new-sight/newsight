services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: news-ai-api
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - redis
    volumes:
      # Let's Encrypt 실운영 인증서 적용 시 호스트 경로를 매핑하여 사용 (도메인 주소로 교체 필요)
      # - /etc/letsencrypt/live/yourdomain.com/fullchain.pem:/etc/nginx/ssl/server.crt:ro
      # - /etc/letsencrypt/live/yourdomain.com/privkey.pem:/etc/nginx/ssl/server.key:ro
      # Certbot 자동 갱신(ACME 챌린지) 웹루트 공유 볼륨
      # - /var/www/certbot:/var/www/certbot:ro
    environment:
      # Neo4j
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      # Ollama Cloud
      - OLLAMA_API_URL=${OLLAMA_API_URL}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME}
      # PostgreSQL (Supabase)
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      # Redis (내부 Docker Compose 네트워크의 redis 서비스 지정)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Alpha Vantage
      - ALPHAVANTAGE_API_KEY=${ALPHAVANTAGE_API_KEY}
      # CORS
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    container_name: news-ai-redis
    restart: always
    ports:
      - "6379:6379"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
