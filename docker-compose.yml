services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: news-ai-api
    restart: always
    ports:
      - "80:8080"
    depends_on:
      - redis
    environment:
      # Neo4j
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      # Ollama Cloud
      - OLLAMA_API_URL=${OLLAMA_API_URL}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME}
      # PostgreSQL (Supabase)
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      # Redis (내부 Docker Compose 네트워크의 redis 서비스 지정)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Alpha Vantage
      - ALPHAVANTAGE_API_KEY=${ALPHAVANTAGE_API_KEY}
      # CORS
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    container_name: news-ai-redis
    restart: always
    ports:
      - "6379:6379"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
