name: News Collection Pipeline

on:
  schedule:
    # 20분 주기 스케줄링 (cron: "*/20 * * * *")
    - cron: '*/20 * * * *'
  workflow_dispatch:
    # GitHub 웹 콘솔에서 수동 실행 가능하도록 지원

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f news_collect_pipeline/requirements.txt ]; then
            pip install -r news_collect_pipeline/requirements.txt
          fi

      - name: Run News Collection Pipeline
        env:
          OLLAMA_API_URL: ${{ secrets.OLLAMA_API_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL_NAME: ${{ secrets.OLLAMA_MODEL_NAME }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          TARGET_COUNTRIES: ${{ secrets.TARGET_COUNTRIES }}
          TARGET_CATEGORIES: ${{ secrets.TARGET_CATEGORIES }}
        run: |
          python news_collect_pipeline/collect_today_news.py
